variables:
  imageName: 'flask-app'

stages:
# ------------------------
# 🏗️ Build & Push Stage
# ------------------------
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name s3app
          docker build -t s3app.azurecr.io/$(imageName):$(Build.BuildId) .
          docker push s3app.azurecr.io/$(imageName):$(Build.BuildId)

    # 🔧 Update deployment manifest with image tag
    - script: |
        sed -i "s|s3app.azurecr.io/flask-app:.*|s3app.azurecr.io/flask-app:$(Build.BuildId)|g" kubernetes/deployment.yaml
      displayName: 'Update Image Tag in deployment.yaml'

    # 📦 Publish YAML manifests as artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Kubernetes Manifests'
      inputs:
        PathtoPublish: 'kubernetes'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# ------------------------
# 🚀 Deploy Stage (Release)
# ------------------------
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Kubernetes Manifests'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureCLI@2
      displayName: 'Deploy to AKS'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials --resource-group pavani --name s3cluster

          cd $(System.ArtifactsDirectory)/drop

          # Apply manifests
          kubectl apply -f secrets.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
