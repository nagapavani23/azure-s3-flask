variables:
  imageName: 'flask-app'

stages:
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name s3app
          docker build -t s3app.azurecr.io/$(imageName):$(Build.BuildId) .
          docker push s3app.azurecr.io/$(imageName):$(Build.BuildId)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials --resource-group pavani --name s3cluster
          
          # Optional: apply secrets
          # kubectl apply -f kubernetes/secrets.yaml

          # Update deployment image tag
          sed -i "s|s3app.azurecr.io/flask-app:.*|s3app.azurecr.io/flask-app:$(Build.BuildId)|g" kubernetes/deployment.yaml

          kubectl apply -f kubernetes/deployment.yaml
          kubectl apply -f kubernetes/service.yaml
          kubectl apply -f kubernetes/secrets.yaml
