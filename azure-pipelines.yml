variables:
  imageName: 'flask-app'

stages:
# ------------------------
# 🏗️ Build & Push Stage
# ------------------------
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name s3app
          docker build -t s3app.azurecr.io/$(imageName):$(Build.BuildId) .
          docker push s3app.azurecr.io/$(imageName):$(Build.BuildId)

    - script: |
        echo "Replacing IMAGE_TAG_PLACEHOLDER with $(Build.BuildId)..."
        sed -i "s|IMAGE_TAG_PLACEHOLDER|$(Build.BuildId)|g" kubernetes/deployment.yaml
      displayName: 'Replace IMAGE_TAG_PLACEHOLDER in deployment.yaml'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Kubernetes YAMLs'
      inputs:
        PathtoPublish: 'kubernetes'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# ------------------------
# 🚀 Deploy Stage
# ------------------------
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Kubernetes YAMLs'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureCLI@2
      displayName: 'Deploy to AKS'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials --resource-group pavani --name s3cluster
          cd $(System.ArtifactsDirectory)/drop
          kubectl apply -f secrets.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
