variables:
  imageName: 'flask-app'

stages:
# ------------------------
# 🏗️ Build & Push Stage
# ------------------------
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      displayName: 'Build and Push Docker Image'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "🔐 Logging into Azure Container Registry..."
          az acr login --name s3app

          echo "⚙️ Setting up Docker Buildx..."
          docker buildx create --use || true

          echo "🐳 Building and pushing Docker image for linux/amd64..."
          docker buildx build \
            --platform linux/amd64 \
            -t s3app.azurecr.io/$(imageName):$(Build.BuildId) \
            --push .

    # 🔧 Update deployment manifest with actual image tag
    - script: |
        echo "🔄 Replacing placeholder image tag in deployment.yaml..."
        sed -i "s|__BUILD_TAG__|$(Build.BuildId)|g" kubernetes/deployment.yaml
      displayName: 'Replace Image Tag in deployment.yaml'

    # 📦 Publish YAML manifests as artifact
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Kubernetes Manifests'
      inputs:
        PathtoPublish: 'kubernetes'
        ArtifactName: 'drop'
        publishLocation: 'Container'

# ------------------------
# 🚀 Deploy Stage (Release)
# ------------------------
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Kubernetes Manifests'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: AzureCLI@2
      displayName: 'Deploy to AKS'
      inputs:
        azureSubscription: az-s3
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "🔑 Getting AKS credentials..."
          az aks get-credentials --resource-group pavani --name s3cluster

          echo "🚀 Applying Kubernetes manifests..."
          cd $(System.ArtifactsDirectory)/drop

          kubectl apply -f secrets.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml
