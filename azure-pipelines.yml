trigger:
- main

variables:
  imageName: 'flask-app'

stages:
- stage: Build
  displayName: Build and Push to ACR
  jobs:
  - job: Build
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '<your-service-connection-name>'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr login --name <acr-name>
          docker build -t <acr-name>.azurecr.io/$(imageName):$(Build.BuildId) .
          docker push <acr-name>.azurecr.io/$(imageName):$(Build.BuildId)

- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: '<your-service-connection-name>'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az aks get-credentials --resource-group <resource-group> --name <aks-name>
          sed -i "s|<ACR_NAME>.azurecr.io|<acr-name>.azurecr.io|g" manifests/deployment.yaml
          kubectl apply -f manifests/deployment.yaml
          kubectl apply -f manifests/service.yaml
